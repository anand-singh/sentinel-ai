server.port=${PORT:8080}
spring.application.name=sentinel-api
spring.main.banner-mode=off
spring.main.allow-bean-definition-overriding=true
management.tracing.enabled=true
logging.level.com.ing.sentinel=INFO
logging.level.com.google.adk=WARN
# Allow up to 120s for the ADK orchestrator pipeline (LLM calls can be slow)
spring.mvc.async.request-timeout=120000
server.tomcat.connection-timeout=125000
